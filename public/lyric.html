<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100vh; overflow: hidden;
    -webkit-app-region: drag; user-select: none;
  }
  .lyric-current {
    font-size: 28px; font-weight: 600; color: #ffffff;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
    transition: all 0.3s ease; white-space: nowrap; max-width: 90vw;
    overflow: hidden; text-overflow: ellipsis;
  }
  .lyric-next {
    font-size: 18px; color: rgba(255,255,255,0.4); margin-top: 8px;
    white-space: nowrap; max-width: 90vw;
    overflow: hidden; text-overflow: ellipsis;
  }
  /* Fade edges */
  body::before {
    content: ''; position: fixed; top: 0; left: 0; right: 0; height: 30px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
    pointer-events: none; z-index: 1;
  }
  body::after {
    content: ''; position: fixed; bottom: 0; left: 0; right: 0; height: 30px;
    background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
    pointer-events: none; z-index: 1;
  }
</style>
</head>
<body>
  <div class="lyric-current" id="lyricCurrent" aria-live="assertive" aria-atomic="true"></div>
  <div class="lyric-next" id="lyricNext" role="status"></div>
  <script>
    // Listen for lyric updates from main process via preload bridge
    if (window.fluidmusic && window.fluidmusic.onLyricUpdate) {
      window.fluidmusic.onLyricUpdate(({ text, nextText }) => {
        document.getElementById('lyricCurrent').textContent = text || '';
        document.getElementById('lyricNext').textContent = nextText || '';
      });
    }
  </script>
</body>
</html>
